        ],
        tradOptions: [
            { text: "Ele disse que a felicidade não acaba antes de ninguém.", correct: false },
            { text: "O mesmo aconselhava a não considerar ninguém feliz antes do fim.", correct: true }

        ]
    }
    
];

function renderQuestions() {
    const container = document.getElementById('questions-container');
    if (!container) return;
    container.innerHTML = questions.map(q => `
        <div class="question-box">
            <span class="greek-text">${q.greek}</span>
            <div class="section-title">
                Análise Morfossintática
                <button class="btn-hint" onclick="openHint('${q.hint.replace(/'/g, "\\'")}')">🔍 Sherlock</button>
            </div>
            <button class="treebank-trigger" onclick="toggleTree(this)">Ver Diagrama AGDT <span>▼</span></button>
            <div class="treebank-content"><img src="${q.tree}" style="max-width:100%;"></div>
            <select id="morf${q.id}">
                <option value="">-- Selecione a análise --</option>
                ${q.morfOptions.map((opt, i) => `<option value="${i}">${opt.text}</option>`).join('')}
            </select>
            <div class="section-title">Tradução Correta</div>
            <select id="trad${q.id}">
                <option value="">-- Selecione a tradução --</option>
                ${q.tradOptions.map((opt, i) => `<option value="${i}">${opt.text}</option>`).join('')}
            </select>
            <div id="feedback${q.id}" class="feedback"></div>
            <button style="background:var(--primary);color:white;border:none;padding:10px;width:100%;border-radius:5px;cursor:pointer;font-weight:bold;" onclick="checkAnswer(${q.id})">Verificar</button>
        </div>
    `).join('');
}

function toggleTree(btn) {
    const content = btn.nextElementSibling;
    content.classList.toggle('active');
    btn.querySelector('span').textContent = content.classList.contains('active') ? '▲' : '▼';
}

function openHint(text) {
    document.getElementById('hintContent').innerHTML = `<h3 style="color:var(--primary)">Sherlock Gramatical</h3>${text}`;
    document.getElementById('hintModal').style.display = 'block';
}

function closeHint() { document.getElementById('hintModal').style.display = 'none'; }

window.onclick = function(event) {
    if (event.target == document.getElementById('hintModal')) closeHint();
};

function checkAnswer(id) {
    const q = questions.find(item => item.id === id);
    const mIdx = document.getElementById(`morf${id}`).value;
    const tIdx = document.getElementById(`trad${id}`).value;
    const fb = document.getElementById(`feedback${id}`);
    if (mIdx === "" || tIdx === "") { fb.innerHTML = "⚠️ Selecione as duas!"; fb.style.color = "orange"; return; }
    if (q.morfOptions[mIdx].correct && q.tradOptions[tIdx].correct) {
        fb.innerHTML = "✓ Correto!"; fb.style.color = "green";
    } else {
        fb.innerHTML = "✗ Tente novamente."; fb.style.color = "red";
    }
}

window.onload = renderQuestions;
</script>
</body>
</html>
